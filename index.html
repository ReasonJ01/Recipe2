<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fffaf2" />
    <title>Recipe Repository</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="gallery-header">
      <p class="kicker">Curated Collection</p>
      <h1>Kitchen Gallery</h1>
      <p>Choose a recipe to open a clean, expressive cookbook-style view.</p>
    </header>

    <main>
      <section class="landing" aria-label="Available recipes">
        <h2>Available Recipes</h2>
        <ul id="recipe-list" class="recipe-grid"></ul>
      </section>

      <section id="recipe-view" class="recipe-view hidden" aria-live="polite"></section>
    </main>

    <script type="module" src="/src/app.mjs"></script>
  </body>
</html>
